name: gophprofile-test

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gophprofile_test
      POSTGRES_USER: gophprofile
      POSTGRES_PASSWORD: gophprofile
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophprofile -d gophprofile_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate-test:
    image: postgres:16-alpine
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      PGPASSWORD: gophprofile
    volumes:
      - ../migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        set -eu
        for file in /migrations/*.up.sql; do
          psql -h postgres-test -U gophprofile -d gophprofile_test -v ON_ERROR_STOP=1 -f "$$file"
        done
