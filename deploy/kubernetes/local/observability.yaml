apiVersion: v1
kind: ServiceAccount
metadata:
  name: gophprofile-alloy
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: gophprofile-local
automountServiceAccountToken: true
---
# Alloy получает доступ только к журналам приложения в пространстве gophprofile
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gophprofile-alloy-logs
  namespace: gophprofile
  labels:
    app.kubernetes.io/part-of: gophprofile-local
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gophprofile-alloy-logs
  namespace: gophprofile
  labels:
    app.kubernetes.io/part-of: gophprofile-local
subjects:
  - kind: ServiceAccount
    name: gophprofile-alloy
    namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gophprofile-alloy-logs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gophprofile-loki-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: gophprofile-local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gophprofile-loki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: gophprofile-local
spec:
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: gophprofile-local
  ports:
    - name: http
      port: 3100
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophprofile-loki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: gophprofile-local
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/part-of: gophprofile-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
        app.kubernetes.io/part-of: gophprofile-local
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: loki
          image: grafana/loki:3.6.0
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/loki.yml
          ports:
            - name: http
              containerPort: 3100
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: gophprofile-loki-config
        - name: data
          persistentVolumeClaim:
            claimName: gophprofile-loki-data
---
apiVersion: v1
kind: Service
metadata:
  name: gophprofile-alloy
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: gophprofile-local
spec:
  selector:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: gophprofile-local
  ports:
    - name: http
      port: 12345
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophprofile-alloy
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: gophprofile-local
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/part-of: gophprofile-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
        app.kubernetes.io/part-of: gophprofile-local
    spec:
      serviceAccountName: gophprofile-alloy
      securityContext:
        fsGroup: 473
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: alloy
          image: grafana/alloy:v1.14.0
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          ports:
            - name: http
              containerPort: 12345
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
          startupProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 473
            runAsGroup: 473
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: config
          configMap:
            name: gophprofile-alloy-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gophprofile-kafka-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: gophprofile-local
spec:
  selector:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: gophprofile-local
  ports:
    - name: metrics
      port: 9308
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophprofile-kafka-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: gophprofile-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-exporter
      app.kubernetes.io/part-of: gophprofile-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-exporter
        app.kubernetes.io/part-of: gophprofile-local
    spec:
      automountServiceAccountToken: false
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.9.0
          imagePullPolicy: IfNotPresent
          args:
            - --kafka.server=gophprofile-kafka.gophprofile.svc.cluster.local:9092
          ports:
            - name: metrics
              containerPort: 9308
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
