global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/prometheus-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: gophprofile-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:9090

  - job_name: gophprofile-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9091

  - job_name: kafka-exporter
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
