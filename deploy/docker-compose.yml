services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gophprofile
      POSTGRES_USER: gophprofile
      POSTGRES_PASSWORD: gophprofile
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophprofile -d gophprofile"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: gophprofile
    volumes:
      - ../migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        set -eu
        for file in /migrations/*.up.sql; do
          psql -h postgres -U gophprofile -d gophprofile -v ON_ERROR_STOP=1 -f "$$file"
        done

  kafka:
    image: bitnami/kafka:4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      minio:
        condition: service_started
    environment:
      APP_ENV: local
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://gophprofile:gophprofile@postgres:5432/gophprofile?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: gophprofile-avatars
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      API_RATE_LIMIT_RPS: "20"
      API_RATE_LIMIT_BURST: "40"
      VAULT_ENABLED: "false"
    ports:
      - "8080:8080"

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/app/worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      minio:
        condition: service_started
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://gophprofile:gophprofile@postgres:5432/gophprofile?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: gophprofile-avatar-worker
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: gophprofile-avatars
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      VAULT_ENABLED: "false"

  frontend:
    build:
      context: ../web/frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres-data:
  kafka-data:
  minio-data:
