services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gophprofile
      POSTGRES_USER: gophprofile
      POSTGRES_PASSWORD: gophprofile
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophprofile -d gophprofile"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: gophprofile
    volumes:
      - ../migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        set -eu
        for file in /migrations/*.up.sql; do
          psql -h postgres -U gophprofile -d gophprofile -v ON_ERROR_STOP=1 -f "$$file"
        done

  kafka:
    image: apache/kafka:4.0.0
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9092'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  kafka-init:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -eu
        for topic in \
          avatar.process.v1 \
          avatar.process.retry.1m.v1 \
          avatar.process.retry.5m.v1 \
          avatar.process.retry.30m.v1 \
          avatar.process.dead-letter.v1 \
          avatar.delete.v1
        do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:9092 \
            --create \
            --if-not-exists \
            --topic "$$topic" \
            --partitions 3 \
            --replication-factor 1
        done

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      APP_ENV: local
      LOG_LEVEL: info
      LOG_FORMAT: json
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: gophprofile-server
      METRICS_ADDR: :9090
      HTTP_ADDR: :8080
      DEFAULT_AVATAR_PATH: /app/default_avatar.png
      DATABASE_URL: postgres://gophprofile:gophprofile@postgres:5432/gophprofile?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gophprofile-server
      KAFKA_CONSUMER_GROUP: gophprofile-avatar-worker
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: gophprofile-avatars
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:5173
      API_RATE_LIMIT_RPS: "20"
      API_RATE_LIMIT_BURST: "40"
      VAULT_ENABLED: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/metrics >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/app/worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      APP_ENV: local
      LOG_LEVEL: info
      LOG_FORMAT: json
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: gophprofile-worker
      METRICS_ADDR: :9091
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://gophprofile:gophprofile@postgres:5432/gophprofile?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gophprofile-worker
      KAFKA_CONSUMER_GROUP: gophprofile-avatar-worker
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: gophprofile-avatars
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:5173
      VAULT_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/metrics >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend-build:
    build:
      context: ../web/frontend
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/web/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  kafka-data:
  minio-data:
