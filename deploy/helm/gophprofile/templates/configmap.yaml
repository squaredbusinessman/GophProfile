apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gophprofile.configMapName" . }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  OTEL_ENABLED: {{ .Values.config.otel.enabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otel.exporterOtlpEndpoint | quote }}
  OTEL_EXPORTER_OTLP_INSECURE: {{ .Values.config.otel.exporterOtlpInsecure | quote }}
  OTEL_TRACES_SAMPLER: {{ .Values.config.otel.tracesSampler | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.config.otel.tracesSamplerArg | quote }}
  HTTP_ADDR: {{ .Values.config.http.addr | quote }}
  DEFAULT_AVATAR_PATH: {{ .Values.config.http.defaultAvatarPath | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.http.corsAllowedOrigins | quote }}
  API_RATE_LIMIT_RPS: {{ .Values.config.http.rateLimitRps | quote }}
  API_RATE_LIMIT_BURST: {{ .Values.config.http.rateLimitBurst | quote }}
  KAFKA_BROKERS: {{ .Values.config.kafka.brokers | quote }}
  KAFKA_CONSUMER_GROUP: {{ .Values.config.kafka.consumerGroup | quote }}
  S3_ENDPOINT: {{ .Values.config.s3.endpoint | quote }}
  S3_BUCKET: {{ .Values.config.s3.bucket | quote }}
  S3_USE_PATH_STYLE: {{ .Values.config.s3.usePathStyle | quote }}
  S3_REGION: {{ .Values.config.s3.region | quote }}
  VAULT_ENABLED: {{ .Values.config.vault.enabled | quote }}
  VAULT_ADDR: {{ .Values.config.vault.addr | quote }}
  VAULT_KV_MOUNT: {{ .Values.config.vault.kvMount | quote }}
  VAULT_SERVICE_PATH: {{ .Values.config.vault.servicePath | quote }}
  VAULT_TIMEOUT: {{ .Values.config.vault.timeout | quote }}
