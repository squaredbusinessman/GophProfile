{{- if .Values.server.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gophprofile.fullname" . }}-server
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.autoscaling.server.enabled }}
  replicas: {{ .Values.server.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gophprofile.componentSelectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gophprofile.componentSelectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "server") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "gophprofile.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: {{ include "gophprofile.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.server.command | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.server.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.server.ports.metrics }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gophprofile.configMapName" . }}
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.server.env.otelServiceName | quote }}
            - name: METRICS_ADDR
              value: {{ .Values.server.env.metricsAddr | quote }}
            - name: KAFKA_CLIENT_ID
              value: {{ .Values.server.env.kafkaClientId | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gophprofile.secretName" . }}
                  key: DATABASE_URL
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gophprofile.secretName" . }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gophprofile.secretName" . }}
                  key: S3_SECRET_KEY
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gophprofile.secretName" . }}
                  key: VAULT_TOKEN
                  optional: true
          readinessProbe:
            httpGet:
              path: {{ .Values.server.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.server.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.server.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.server.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.server.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.server.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.server.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
{{- end }}
